name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run shellcheck on shell scripts
        run: |
          which shellcheck || apt-get update && apt-get install -y shellcheck
          find . -name "*.sh" -exec shellcheck {} \;
      
      - name: Check for secrets
        run: |
          # Simple check for common secret patterns (not comprehensive)
          grep -r "password\s*=" . --include="*.sh" --include="*.js" || true
          grep -r "api_key\s*=" . --include="*.sh" --include="*.js" || true
