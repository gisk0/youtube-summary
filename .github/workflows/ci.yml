name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run shellcheck on shell scripts
        run: |
          which shellcheck || apt-get update && apt-get install -y shellcheck
          # Warn but don't fail
          find . -name "*.sh" -exec shellcheck {} \; || echo "Shellcheck warnings found"
      
      - name: Check for sensitive files
        run: |
          # Check that no sensitive files are committed
          echo "Checking for common sensitive files..."
          [ ! -f .env ] || (echo ".env found" && exit 1)
          [ ! -f *.key ] || (echo "key file found" && exit 1)
          [ ! -f *credentials*.json ] || (echo "credentials found" && exit 1)
          echo "No sensitive files found"
