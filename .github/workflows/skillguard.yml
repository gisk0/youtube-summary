name: SkillGuard Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  skillguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SkillGuard Scanner
        run: |
          # Clone scanner
          git clone -q https://github.com/gisk0/skillguard-scanner.git /tmp/scanner
          
          # Get skill name from repo
          SKILL_NAME=$(echo "${{ github.repository }}" | sed 's/gisk0\///')
          
          # Create skills directory structure
          mkdir -p /tmp/skills/$SKILL_NAME
          cp -r repo/* /tmp/skills/$SKILL_NAME/ 2>/dev/null || true
          cp -r repo/.* /tmp/skills/$SKILL_NAME/ 2>/dev/null || true
          
          # Run scanner
          python3 /tmp/scanner/scripts/scanner.py \
            --skills-dir /tmp/skills \
            --skill "$SKILL_NAME" \
            --json-out /tmp/skillguard-report.json
          
          # Check for CRITICAL/HIGH findings
          if grep -q '"risk_level": "CRITICAL"' /tmp/skillguard-report.json; then
            echo "❌ CRITICAL security issues found!"
            cat /tmp/skillguard-report.json
            exit 1
          fi
          
          if grep -q '"risk_level": "HIGH"' /tmp/skillguard-report.json; then
            echo "⚠️ HIGH security issues found!"
            cat /tmp/skillguard-report.json
            exit 1
          fi
          
          echo "✅ No critical security issues"
