name: SkillGuard Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  skillguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SkillGuard Scanner
        run: |
          # Clone the scanner
          cd /tmp
          git clone -q https://github.com/gisk0/skillguard-scanner.git
          cd skillguard-scanner
          
          # Get the skill name from repo (extract from repo name)
          SKILL_NAME=$(echo "${{ github.repository }}" | sed 's/gisk0-//')
          
          # Run scanner (continue even if it fails)
          python3 scripts/scanner.py --skills-dir ${{ github.workspace }} --skill "$SKILL_NAME" --json-out /tmp/skillguard-report.json || true
          
          # Check for CRITICAL/HIGH findings
          if [ -f /tmp/skillguard-report.json ]; then
            if grep -q '"severity": "CRITICAL"' /tmp/skillguard-report.json; then
              echo "❌ CRITICAL security issues found!"
              cat /tmp/skillguard-report.json
              exit 1
            fi
            if grep -q '"severity": "HIGH"' /tmp/skillguard-report.json; then
              echo "⚠️ HIGH security issues found!"
              cat /tmp/skillguard-report.json
              exit 1
            fi
          fi
          
          echo "✅ No critical security issues found"
