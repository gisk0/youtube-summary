name: SkillGuard Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  skillguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SkillGuard Scanner
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workspace: ${{ github.workspace }}"
          ls -la
          
          # Clone the scanner
          cd /tmp
          rm -rf skillguard-scanner
          git clone -q https://github.com/gisk0/skillguard-scanner.git
          cd skillguard-scanner
          
          # Check if skill/ subfolder exists (some repos have it)
          WORKSPACE="${{ github.workspace }}"
          if [ -d "$WORKSPACE/skill" ]; then
            SKILL_DIR="$WORKSPACE/skill"
            SKILL_NAME=$(echo "${{ github.repository }}" | sed 's/gisk0\///')
          else
            # Skill is at root level
            SKILL_DIR="$WORKSPACE"
            SKILL_NAME=$(echo "${{ github.repository }}" | sed 's/gisk0\///')
          fi
          
          echo "Scanning: $SKILL_NAME from $SKILL_DIR"
          
          # Run scanner
          python3 scripts/scanner.py \
            --skills-dir "$SKILL_DIR" \
            --skill "$SKILL_NAME" \
            --json-out /tmp/skillguard-report.json 2>&1 || true
          
          # Show results
          if [ -f /tmp/skillguard-report.json ]; then
            cat /tmp/skillguard-report.json
          fi
          
          echo "✅ Scan completed"
