name: SkillGuard Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  skillguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SkillGuard Scanner
        run: |
          echo "Running SkillGuard scanner..."
          
          # Clone the scanner (quietly)
          cd /tmp
          rm -rf skillguard-scanner
          git clone -q https://github.com/gisk0/skillguard-scanner.git
          cd skillguard-scanner
          
          # Get skill name from repo
          REPO_NAME=$(echo "${{ github.repository }}" | sed 's/gisk0\///')
          echo "Scanning skill: $REPO_NAME"
          
          # Run scanner (workspace is at $1)
          cd ${{ github.workspace }}
          python3 /tmp/skillguard-scanner/scripts/scanner.py \
            --skills-dir . \
            --skill "$REPO_NAME" \
            --json-out /tmp/skillguard-report.json 2>&1 || true
          
          # Report results
          if [ -f /tmp/skillguard-report.json ]; then
            echo "Scan complete. Results:"
            cat /tmp/skillguard-report.json
          else
            echo "No report generated - scanner may have issues"
          fi
          
          echo "✅ SkillGuard scan completed"
